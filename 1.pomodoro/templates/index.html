<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="screen">
      <section class="card" aria-label="ポモドーロタイマー">
        <header class="title-bar">
          <h1>ポモドーロタイマー</h1>
          <div class="window-actions" aria-hidden="true">
            <span>－</span>
            <span>□</span>
            <span>×</span>
          </div>
        </header>

        <p class="status" id="timer-status" aria-live="polite">作業中</p>

        <section class="progress-area" aria-label="タイマー進捗">
          <div class="ring" id="timer-ring" role="img" aria-label="進捗 0%" style="--progress: 0%;">
            <div class="ring-inner">
              <p class="time" id="timer-time">25:00</p>
            </div>
          </div>
        </section>

        <section class="actions" aria-label="タイマー操作">
          <button type="button" class="btn btn-primary" id="btn-primary-action">開始</button>
          <button type="button" class="btn btn-outline" id="btn-reset">リセット</button>
        </section>

        <section class="summary" aria-label="今日の進捗">
          <h2>今日の進捗</h2>
          <div class="summary-grid">
            <article>
              <p class="summary-value">4</p>
              <p class="summary-label">完了</p>
            </article>
            <article>
              <p class="summary-value">1時間40分</p>
              <p class="summary-label">集中時間</p>
            </article>
          </div>
        </section>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/timer_engine.js') }}"></script>
    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
  </body>
</html>
