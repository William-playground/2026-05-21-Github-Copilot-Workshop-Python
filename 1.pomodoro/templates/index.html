<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ポモドーロタイマー</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  </head>
  <body>
    <main class="screen">
      <section class="card" aria-label="ポモドーロタイマー">
        <header class="title-bar">
          <h1>ポモドーロタイマー</h1>
          <div class="window-actions" aria-hidden="true">
            <span>－</span>
            <span>□</span>
            <span>×</span>
          </div>
        </header>

        <p class="status" aria-live="polite">作業中</p>

        <section class="progress-area" aria-label="タイマー進捗">
          <div class="ring" role="img" aria-label="進捗 72%">
            <div class="ring-inner">
              <p class="time">25:00</p>
            </div>
          </div>
        </section>

        <section class="actions" aria-label="タイマー操作">
          <button type="button" class="btn btn-primary">開始</button>
          <button type="button" class="btn btn-outline">リセット</button>
        </section>

        <section class="summary" aria-label="今日の進捗">
          <h2>今日の進捗</h2>
          <div class="summary-grid">
            <article>
              <p class="summary-value">4</p>
              <p class="summary-label">完了</p>
            </article>
            <article>
              <p class="summary-value">1時間40分</p>
              <p class="summary-label">集中時間</p>
            </article>
          </div>
        </section>

        <section class="gamification" aria-label="ゲーミフィケーション">
          <h2>達成状況</h2>

          <div class="level-row">
            <span class="level-badge" id="g-level">Lv. 1</span>
            <div class="xp-bar" role="progressbar" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0" id="g-xp-bar">
              <div class="xp-bar-fill" id="g-xp-fill"></div>
            </div>
            <span class="xp-text" id="g-xp-text">0 / 100 XP</span>
          </div>

          <div class="streak-row">
            <span class="streak-flame" aria-hidden="true">🔥</span>
            <span class="streak-text">連続達成 <strong id="g-streak">0</strong> 日</span>
            <span class="success-text">成功率 <strong id="g-success-rate">0%</strong></span>
          </div>

          <h3>バッジ</h3>
          <ul class="badge-list" id="g-badges" aria-label="獲得バッジ一覧"></ul>

          <div class="stats-header">
            <h3>統計</h3>
            <div class="stats-toggle" role="tablist">
              <button type="button" class="stats-tab is-active" data-range="week" role="tab" aria-selected="true">週間</button>
              <button type="button" class="stats-tab" data-range="month" role="tab" aria-selected="false">月間</button>
            </div>
          </div>
          <div class="stats-totals" id="g-stats-totals" aria-live="polite"></div>
          <div class="stats-chart" id="g-stats-chart" role="img" aria-label="集中ポモドーロ日別グラフ"></div>
        </section>
      </section>
    </main>
    <script src="{{ url_for('static', filename='js/gamification.js') }}" defer></script>
  </body>
</html>
